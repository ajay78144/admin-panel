<div class="sidebar">

  <!-- 🌸 TOP -->
  <div class="top">

    <!-- 🌸 LOGO -->
    <div class="logo-box">

      <div class="logo-circle">
        🌿
      </div>

      <h2 class="logo">
        Mehndi Admin
      </h2>

    </div>

    <!-- 🌸 MENU -->
    <ul class="menu">

      <!-- 🌸 DASHBOARD -->
      <li
        routerLink="/dashboard"
        routerLinkActive="active"
      >

        <span class="icon">
          🏠
        </span>

        <span class="text">
          Dashboard
        </span>

      </li>

      <!-- 🌸 CATEGORIES -->
      <li
        routerLink="/categories"
        routerLinkActive="active"
      >

        <span class="icon">
          📂
        </span>

        <span class="text">
          Categories
        </span>

      </li>

      <!-- 🌸 ADD CATEGORY -->
      <li
        routerLink="/add-category"
        routerLinkActive="active"
      >

        <span class="icon">
          ➕
        </span>

        <span class="text">
          Add Category
        </span>

      </li>

      <!-- 🌸 ALL IMAGES -->
      <li
        routerLink="/images"
        routerLinkActive="active"
      >

        <span class="icon">
          🖼
        </span>

        <span class="text">
          All Images
        </span>

      </li>

      <!-- 🌸 UPLOAD IMAGE -->
      <li
        routerLink="/add-image"
        routerLinkActive="active"
      >

        <span class="icon">
          ⬆
        </span>

        <span class="text">
          Upload Image
        </span>

      </li>

      <!-- 🌸 TRENDING -->
      <li
        routerLink="/trending"
        routerLinkActive="active"
      >

        <span class="icon">
          ⭐
        </span>

        <span class="text">
          Trending
        </span>

      </li>

      <!-- 🌸 SETTINGS -->
      <li
        routerLink="/settings"
        routerLinkActive="active"
      >

        <span class="icon">
          ⚙
        </span>

        <span class="text">
          Settings
        </span>

      </li>

    </ul>

  </div>

  <!-- 🌸 BOTTOM -->
  <div class="bottom">

    <!-- 🌸 LOGOUT -->
    <div
      class="logout"
      (click)="logout()"
    >

      <span class="icon">
        🚪
      </span>

      <span class="text">
        Logout
      </span>

    </div>

  </div>

</div>
